<script>
  // Scroll to booking form on button click
  document.getElementById('scrollToBookingBtn').addEventListener('click', () => {
    const bookingSection = document.getElementById('booking-title');
    bookingSection.scrollIntoView({ behavior: 'smooth', block: 'start' });
    setTimeout(() => {
      document.getElementById('fullName').focus();
    }, 500);
  });

  // Set min attribute for date input to today
  const inspectionDateInput = document.getElementById('inspectionDate');
  function setMinDate() {
    const today = new Date();
    const yyyy = today.getFullYear();
    const mm = String(today.getMonth() + 1).padStart(2, '0');
    const dd = String(today.getDate()).padStart(2, '0');
    inspectionDateInput.min = `${yyyy}-${mm}-${dd}`;
  }
  setMinDate();

  // Form Validation and Submission
  const form = document.getElementById('bookingForm');
  const formMessage = document.getElementById('formMessage');
  const fields = [
    { id: 'fullName', validator: value => value.trim().length > 1, errorMsg: 'Please enter your full name' },
    { id: 'email', validator: value => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(value.trim()), errorMsg: 'Please enter a valid email address' },
    { id: 'phone', validator: value => /^[\d\s\-\+\(\)]{7,15}$/.test(value.trim()), errorMsg: 'Please enter a valid phone number' },
    { id: 'serviceType', validator: value => value !== '', errorMsg: 'Please select a service type' },
    { id: 'inspectionDate', validator: value => {
      if (!value) return false;
      const selected = new Date(value);
      const now = new Date();
      now.setHours(0,0,0,0);
      return selected >= now;
    }, errorMsg: 'Please select a valid date' },
  ];

  function resetErrors() {
    fields.forEach(({id}) => {
      const input = document.getElementById(id);
      input.setAttribute('aria-invalid', 'false');
      const errorSpan = input.parentElement.querySelector('.error-msg');
      if (errorSpan) errorSpan.style.display = 'none';
    });
    formMessage.textContent = '';
    formMessage.className = 'form-msg';
  }

  function showError(id, message) {
    const input = document.getElementById(id);
    input.setAttribute('aria-invalid', 'true');
    const errorSpan = input.parentElement.querySelector('.error-msg');
    if (errorSpan) {
      errorSpan.textContent = message;
      errorSpan.style.display = 'block';
    }
  }

  form.addEventListener('submit', async e => {
    e.preventDefault();
    resetErrors();
    let isFormValid = true;

    fields.forEach(({id, validator, errorMsg}) => {
      const el = document.getElementById(id);
      const val = el.value;
      if (!validator(val)) {
        isFormValid = false;
        showError(id, errorMsg);
      }
    });

    if (!isFormValid) {
      formMessage.textContent = 'Please fix the errors and try again.';
      formMessage.classList.add('error');
      return;
    }

    // Prepare payload for backend
    const payload = {
      customer_name: document.getElementById('fullName').value.trim(),
      email: document.getElementById('email').value.trim(),
      issue_description: `Service: ${document.getElementById('serviceType').value} | Date: ${document.getElementById('inspectionDate').value} | Phone: ${document.getElementById('phone').value} | Notes: ${document.getElementById('notes').value}`
    };

    formMessage.textContent = 'Processing AI analysis and submitting request...';
    formMessage.classList.remove('error', 'success');
    const submitBtn = form.querySelector('button[type=submit]');
    submitBtn.disabled = true;

    try {
      const response = await fetch("https://voltshield.onrender.com/run-crew", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      const data = await response.json();

      if (response.ok) {
        formMessage.textContent = 'Success! Your inspection has been scheduled and the AI analysis report was sent.';
        formMessage.classList.add('success');
        form.reset();
        setMinDate();
      } else {
        formMessage.textContent = 'Error: ' + (data.detail || 'Failed to process request.');
        formMessage.classList.add('error');
      }
    } catch (error) {
      console.error("Network error:", error);
      formMessage.textContent = 'Network error. Please check your connection and try again.';
      formMessage.classList.add('error');
    } finally {
      submitBtn.disabled = false;
    }
  });
</script>
